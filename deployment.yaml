apiVersion: apps/v1
kind: Deployment
metadata:
  name: mj-gitops-app
  labels:
    app: mj-gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mj-gitops-app
  template:
    metadata:
      labels:
        app: mj-gitops-app
    spec:
      containers:
      - name: mj-gitops-app
        # CHANGE THIS TO YOUR DOCKER HUB USERNAME
        image: YOUR_DOCKERHUB_USERNAME/mj-gitops-app:v1.0.0 
        ports:
        - containerPort: 8008
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
